name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Fast gate: type-check (.svelte included via svelte-check), lint, and unit tests.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run test:unit -- --run

  # End-to-end. Playwright builds and serves its own preview on PLAYWRIGHT_PORT
  # (default 4197, --strictPort) and honours reuseExistingServer:!CI, so it is
  # independent of the local dev server and safe in CI.
  e2e:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
